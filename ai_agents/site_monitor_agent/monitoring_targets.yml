targets:
  - page_key: modhouse_audio_argon_b_stock
    url: "https://www.modhouseaudio.com/headphones-bstock"
    slack_channel: "#site-change-alerts"
    desired_state_description: >
      Either Argon MK3 or T60RP Argon is in stock and can be purchased now.
      Prefer balanced-modded units if the page distinguishes that.
    undesired_state_description: >
      Neither Argon MK3 nor T60RP Argon is currently purchasable.
      Treat sold out, unavailable, discontinued, waitlist, and preorder-only as undesired.
    css_selectors:
      - "title"
      - ".product-title"
      - ".price"
      - ".availability"
      - "button"
    include_text_patterns:
      - "argon"
      - "mk3"
      - "t60"
      - "in stock"
      - "out of stock"
      - "add to cart"
      - "sold out"
    reminder_interval_minutes: 480
    send_missed_it_message: true
    custom_prompt: >
      Focus only on listings for Argon MK3 and T60RP Argon on the B-stock page.
      Decide whether either product can actually be purchased now.
      Treat sold out, unavailable, discontinued, waitlist, or preorder-only as undesired.
      If the page distinguishes balanced vs non-balanced versions, mention that in the summary,
      but do not mark the item undesired solely because it can also be used single ended.