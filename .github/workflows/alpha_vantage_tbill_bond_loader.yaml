name: alpha_vantage_historical_bond_data_loader

on:
  push:
    branches:
      - "main"
    paths:
      - "etl_pipelines/alpha_vantage_library/*"
      - "etl_pipelines/etl_library/*"
      - "etl_pipelines/alpha_vantage_bond_load/*"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Read version
        id: version
        run: echo "value=$(cat etl_pipelines/alpha_vantage_bond_load/VERSION)" >> "$GITHUB_OUTPUT"     

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./etl_pipelines/
          file: ./etl_pipelines/alpha_vantage_bond_load/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            markhamlee/alphavantage_bond_data_loader:latest
            markhamlee/alphavantage_bond_data_loader:${{ steps.version.outputs.value }}