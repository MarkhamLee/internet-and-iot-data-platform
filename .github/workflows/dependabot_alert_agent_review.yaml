name: dependabot_alert_review_agent

on:
  push:
    branches:
      - "main"
    paths:
      - "ai_agents/dependabot_agent/*"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Read version
        id: version
        run: echo "value=$(cat ai_agents/dependabot_agent/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./ai_agents/
          file: ./ai_agents/dependabot_agent/Dockerfile
          platforms: linux/amd64
          push: true
          tags: | 
            markhamlee/github_dependabot_alert_review:latest
            markhamlee/github_dependabot_alert_review:${{ steps.version.outputs.value }}